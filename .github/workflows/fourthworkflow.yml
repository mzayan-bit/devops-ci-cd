name: Fourth workflow (Job Status)

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Build step
        run: echo "Building project..."

  test:
    runs-on: ubuntu-latest
    needs: build   # 👈 runs only after build

    steps:
      - name: Test step
        run: echo "Running tests..."

  deploy:
    runs-on: ubuntu-latest
    needs: test   # 👈 runs only after test

    steps:
      - name: Deploy step
        run: echo "Deploying project..."
